<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Pass Time - Game Engine</title>

<style>
html, body{
margin:0;
width:100%;
height:100dvh;
overflow:hidden;

}

body{
  display:flex;

.side{
  width:48%;

}

.card{
  background:#1a1a25;
  border:3px solid #444;

.enemyCard{
background:#2a1010;

.menu{
height:calc(56dvh - 32px);
background:#07070c;
border-top:4px solid #333;

gap:6px;

.menuRow{

.panelHero,.panelAbilities,.panelDesc{

.panelHero{width:25%;}

.panelDesc{flex:1;}

.log{
background:black;
border:2px solid #444;
padding:6px;

@keyframes buttonFlash {
  0% { transform: scale(1); }
  50% { transform: scale(0.97); filter: brightness(1.4); }
  100% { transform: scale(1); }
}

button:active {
  animation: buttonFlash 0.12s ease;
}

button {
  background:#2d2dff;
  border:none;
  padding:6px;
  color:white;
  margin:3px;
  cursor:pointer;
  transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease;
  box-shadow: 0 3px 0 #1a1a80;
}

button:hover {
  filter: brightness(1.2);
}

button:active {
  transform: translateY(2px);

}


button:disabled{opacity:0.4;}

@keyframes tutorialSkillFlash{
  0%{
    box-shadow:0 0 4px gold;
    filter:brightness(1);
  }
  50%{
    box-shadow:0 0 16px gold;
    filter:brightness(1.55);
  }
  100%{
    box-shadow:0 0 4px gold;
    filter:brightness(1);
  }

.tutorialFlash{
  animation:tutorialSkillFlash 0.8s infinite;

}

.xpBar{
width:100%;
height:8px;
background:#222;
border:1px solid #555;

.xpFill{

border-color:yellow;
transform:scale(1.08);
box-shadow:0 0 12px yellow;

.card{

.cardTop{

.resourceText{

.skillAttack{

.skillMagic{

.skillSupport{

.knightSprite{

/* IDLE FRAME */
.knightIdle{

}

/* PLAY 4-FRAME ATTACK */
.knightAttack{
  animation: knightAttack 0.45s steps(4) 1;
}

  animation: knightQuickAttack 0.30s steps(4) 1;
  transform: translate(10px, 10px);
}

/* PLAY 4-FRAME SHIELD */
.knightShield{
  animation: knightShield 0.45s steps(4) 1;
  transform: translate(10px, 20px);
}

.knightShieldBash{
  animation: knightShieldBash 0.55s steps(4) 1;

}

@keyframes knightAttack{

  from{
    background-position:10px 0px;

@keyframes knightShield{

@keyframes knightQuickAttack{

/* ================= TOOLTIP ================= */

position:fixed;

<body>

<div id="turnBar"></div>
<div class="screen">
<div class="side" id="party"></div>
<div class="side" id="enemies"></div>
</div>

<div class="menu">
<div class="menuRow">
<div class="panelHero" id="heroPanel"></div>
<div id="combatHotbar"></div>
<div class="panelAbilities" id="abilityPanel"></div>
<div class="panelDesc" id="descPanel"></div>
</div>
<div class="log" id="log"></div>
</div>

<div id="tooltip"></div>

<script>

/* ================= STATE ================= */

let DEV_START_WAVE = 1; // WAVE SET
let DEV_MODE = DEV_START_WAVE > 1;

let wave = DEV_START_WAVE;

let selectedEnemy = null;
let selectedAlly = null;

let backpack = [];

let currentHeroIndex = 0;

let storyEventsTriggered = {};

let waveHandled = false;

let animationPlaying = false;

let knightAnimTimer = null;

let maxEnemiesThisWave = 5;

let turnQueue = [];
let turnIndex = 0;

let activeTurn = null;

let knightTutorialSkillsUsed = {};

let storyText = `
<p>You rush to stop assassins from killing the King.</p>

Blood stains the halls as defenders fall around you.

<p>The castle is under attack.</p>
`;

let displayedStoryText = "";
let storyTyping = false;
let storyTypeId = 0;


/* ================= UTILS ================= */

function el(id){return document.getElementById(id);}
function d20(){return Math.floor(Math.random()*20)+1;}

function getInitiative(entity, wave) {
  let init = d20() + entity.speed;

  if (wave <= 3 && entity._class === "Knight") {
    init += 10;
  }

  return init;
}

function setKnightAnimation(animClass, duration = 500){

  let sprite = document.querySelector("#party #knightSprite");
  if(!sprite) return;

  animationPlaying = true;

  if(knightAnimTimer){
    clearInterval(knightAnimTimer);
    knightAnimTimer = null;
  }

  let sheet = "sprites/knight_attack.png";
  let moveStart = "translate(0px, -20px)";
  let moveEnd = "translate(0px, -20px)";

  if(animClass === "knightShield"){
    sheet = "sprites/knight_shield.png";
    moveStart = "translate(5px, -5px)";
    moveEnd = "translate(5px, -5px)";
  }
  else if(animClass === "knightQuickAttack"){
    sheet = "sprites/knight_quickattack.png";
    moveStart = "translate(5px, -15px)";
    moveEnd = "translate(5px, -15px)";
  }
  else if(animClass === "knightShieldBash"){
    sheet = "sprites/knight_shieldBash.png";
    moveStart = "translate(10px, -8px)";
    moveEnd = "translate(10px, -8px)";
  }

  sprite.style.backgroundImage = `url("${sheet}")`;
  sprite.style.backgroundSize = "512px 128px";
  sprite.style.backgroundRepeat = "no-repeat";
  sprite.style.backgroundPosition = "0px 0px";
  sprite.style.transform = moveStart;

  let frames = ["0px 0px", "-128px 0px", "-256px 0px", "-384px 0px"];
  let frame = 0;
  let frameTime = duration / frames.length;

  knightAnimTimer = setInterval(() => {
    sprite.style.backgroundPosition = frames[frame];

    if(frame === frames.length - 1){
      sprite.style.transform = moveEnd;
    }

    frame++;

    if(frame >= frames.length){
      clearInterval(knightAnimTimer);

      setTimeout(() => {
        sprite.style.backgroundImage = `url("sprites/knight_attack.png")`;
        sprite.style.backgroundSize = "512px 128px";
        sprite.style.backgroundPosition = "0px 0px";
        sprite.style.transform = "translate(0px, -20px)";
        animationPlaying = false;
        knightAnimTimer = null;
      }, frameTime);
    }
  }, frameTime);
}

function waitForAnimationThenNextTurn(){

  if(animationPlaying){
    setTimeout(waitForAnimationThenNextTurn, 50);
    return;
  }

  nextTurn();
}

function getRarity(item){
  return item?.rarity || "common";
}

function getItemScoreForHero(hero, item){
  if(!item || !item.stats) return 0;

  let weights = {
    attack:1,
    def:1,
    magic:1,
    resist:1,
    hp:0.5,
    speed:0.8,
    critRate:12,
    critMult:8
  };

  if(hero._class === "Knight"){
    weights.attack = 1.3;
    weights.def = 1.4;
    weights.resist = 1.1;
    weights.hp = 0.8;
  }

  if(hero._class === "Rogue"){
    weights.attack = 1.4;
    weights.speed = 1.4;
    weights.critRate = 18;
    weights.critMult = 12;
  }

  if(hero._class === "Cleric"){
    weights.magic = 1.5;
    weights.resist = 1.3;
    weights.def = 1.1;
    weights.mp = 0.8;
  }

  if(hero._class === "Mage"){
    weights.magic = 1.8;
    weights.mp = 1;
    weights.resist = 1.1;
    weights.critRate = 14;
  }

  let score = 0;

  for(let stat in item.stats){
    score += item.stats[stat] * (weights[stat] || 0);
  }

  score += (rarityRank[item.rarity] || 1) * 0.25;

  return score;
}

function shouldEquipForHero(hero, newItem){
  if(!hero || !newItem) return false;

  let slot = newItem.slot;
  let currentItem = hero.equipment?.[slot];

  if(!currentItem) return true;

  return getItemScoreForHero(hero, newItem) > getItemScoreForHero(hero, currentItem);
}

function rarityColor(r){
  if(r === "legendary") return "violet";
  if(r === "rare") return "deepskyblue";
  if(r === "uncommon") return "limegreen";
  if(r === "common") return "white";
}

function showBackpack(){
  let ab = el("abilityPanel");
  let desc = el("descPanel");

  ab.innerHTML = `
    <b style="font-size:16px;">Backpack</b>
    <hr>
  `;

if(backpack.length === 0){
  ab.innerHTML += `No legendary items stored.<br><br>`;

  let backBtn = document.createElement("button");
  backBtn.innerText = "⬅ Back";
  backBtn.onclick = () => showHero(currentHeroIndex);

  ab.appendChild(backBtn);
  return;
}

  backpack.forEach((item, index) => {
    let b = document.createElement("button");
    b.innerText = item.name;

    b.onclick = () => {
let heroButtons = alive(heroes)
  .filter(hero => hero._class !== "PalaceGuard")
  .map((hero, heroIndex) => {
    let realIndex = heroes.indexOf(hero);
    return `<button onclick="equipBackpackItemToHero(${index}, ${realIndex})">
      Equip to ${hero.name}
    </button>`;
  })
  .join("<br>");

desc.innerHTML = `
  <b style="color:${rarityColor(item.rarity)}">${item.name}</b><br>
  Slot: ${item.slot}<br>
  Rarity: ${item.rarity}<br>
  Stats: ${formatItemStats(item)}<br><br>
  ${heroButtons}
`;
    };

    ab.appendChild(b);
  });

ab.innerHTML += `<hr>`;

let backBtn = document.createElement("button");
backBtn.innerText = "⬅ Back";
backBtn.onclick = () => showHero(currentHeroIndex);

ab.appendChild(backBtn);

}

function equipBackpackItem(index){
  let item = backpack[index];
  if(!item) return;

  let equipped = tryPartyEquipItem(item);

  if(equipped){
    backpack.splice(index, 1);
    log(`🎒 ${item.name} removed from Backpack.`);
  }

function equipBackpackItemToHero(itemIndex, heroIndex){
  let item = backpack[itemIndex];
  let hero = heroes[heroIndex];

  if(!item || !hero || hero.hp <= 0) return;

  if(hero._class === "PalaceGuard") return;

  if(!hero.equipment){
    hero.equipment = {weapon:null, armor:null, accessory:null};
  }

  let oldItem = hero.equipment[item.slot];

  hero.equipment[item.slot] = item;
  applyEquipmentStats(hero);

  backpack.splice(itemIndex, 1);

  if(oldItem && oldItem.rarity === "legendary"){
    backpack.push(oldItem);
    log(`🎒 ${oldItem.name} was moved to the Backpack.`);
  }

  log(`⬆️ ${hero.name} equips ${item.name} (${item.slot})`);

  render();
  showHero(heroIndex);
}

  render();
}

// LOG SPEED //
let logQueue = [];
let typing = false;

let skipLogTyping = false;

let skipAllLogs = false;

function log(t, instant = true){
  if(instant){
    let box = el("log");
    let line = document.createElement("div");
    line.innerHTML = t;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;

    // prevent infinite log buildup
    while(box.children.length > 80){
      box.removeChild(box.firstChild);
    }

    return;
  }

  logQueue.push(t);
  if(!typing) typeNextLog();
}

function typeNextLog(){

  // 🚀 IF USER WANTS FULL SKIP
  if(skipAllLogs){
    let box = el("log");

    // dump ALL remaining logs instantly
    while(logQueue.length > 0){
      let text = logQueue.shift();
      let line = document.createElement("div");
      line.innerHTML = text;
      box.appendChild(line);
    }

    box.scrollTop = box.scrollHeight;

    // reset system
    typing = false;
    skipLogTyping = false;
    skipAllLogs = false;

    return;
  }

  if(logQueue.length === 0){
    typing = false;
    return;
  }

  typing = true;

  let text = logQueue.shift();
  let box = el("log");

  let line = document.createElement("div");
  box.appendChild(line);

  let i = 0;
  let buffer = "";

  function typeCharInner(){

    // 🚀 SKIP CURRENT LINE ONLY
    if(skipLogTyping){
      line.innerHTML = text;
      skipLogTyping = false;
      box.scrollTop = box.scrollHeight;
      setTimeout(typeNextLog, 0);
      return;
    }

    if(i < text.length){
      buffer += text[i];
      line.textContent = buffer;
      i++;

      box.scrollTop = box.scrollHeight;

      setTimeout(typeCharInner, 12);
    } else {
      line.innerHTML = buffer;
      box.scrollTop = box.scrollHeight;
      setTimeout(typeNextLog, 60);
    }
  }

  typeCharInner();
}

function formatItemStats(item){
  if(!item || !item.stats) return "";

  let parts = [];

  for(let k in item.stats){
    let v = item.stats[k];
    let sign = v > 0 ? "+" : "";
    parts.push(`${k.toUpperCase()} ${sign}${v}`);
  }

  return parts.join(", ");
}

function getCost(entity, ability){
  let base = ability.cost ?? ability.stamina ?? 0;
  return Math.floor(base + entity.level * 0.6);
}
function alive(list){
return list.filter(x => x && x.hp > 0 && !x.dead);
}

function pruneTurnQueue(){
  turnQueue = turnQueue.filter(q =>
    q &&
    q.entity &&
    q.entity.hp > 0 &&
    !q.entity.dead
  );

  if(turnIndex > turnQueue.length){
    turnIndex = turnQueue.length;
  }
}

function cleanupDeadEnemies(){
  enemies = enemies.filter(e => e && e.hp > 0 && !e.dead);

  pruneTurnQueue();

  if(selectedEnemy != null && enemies[selectedEnemy] == null){
    selectedEnemy = null;
  }

  render();
  renderTurnBar();
}

function getStats(entity){

let eq = entity.equipment || {};

let bonus = {
  attack:0,
  def:0,
  magic:0,
  resist:0,
  hp:0,
  speed:0,
  critRate:0,
  critMult:0
};

for(let k in eq){
  let item = eq[k];
  if(!item) continue;

  for(let stat in item.stats){
    if(bonus[stat] != null){
      bonus[stat] += item.stats[stat];
    }
  }
}

return {
  attack:(entity.attack||0)+bonus.attack,
  def:(entity.def||0)+bonus.def,
  magic:(entity.magic||0)+bonus.magic,
  resist:(entity.resist||0)+bonus.resist,
  hp:(entity.maxHp||0)+bonus.hp,
  speed:(entity.speed||0)+bonus.speed,
  critRate:(entity.critRate||0)+bonus.critRate,
  critMult:(entity.critMult||0)+bonus.critMult
};

}

function setCooldown(entity, ability){
  ability.cooldown = ability.cooldownMax;
}

/* ================= DAMAGE ================= */

function computeDamage(attacker, target, skill){

  let a = getStats(attacker);
  let t = getStats(target);

  let atk = skill.scale === "magic" ? a.magic : a.attack;
  let def = skill.scale === "magic" ? t.resist : t.def;

  // 1. BASE SKILL DAMAGE (main driver)
  let base = skill.power + atk * 0.7;

  // 2. LEVEL SCALING (soft, not exponential)
  let levelScale = 1 + Math.log2(attacker.level + 1) * 0.08;

  // 3. DEFENSE MITIGATION (percentage-based)
  let defenseFactor = 100 / (100 + def);

  // 4. RANDOMNESS (tight range)
  let variance = 0.9 + Math.random() * 0.2;

  let dmg = base * levelScale * defenseFactor * variance;

  // 5. CRIT (applied last)
if(Math.random() < a.critRate){
  dmg *= a.critMult;
    log("💥 CRIT!");
  }

if(target.status?.defend){
  dmg *= (1 - target.status.defend.reduction);
}

return Math.max(1, Math.floor(dmg));
}

/* ================= RESOURCE SYSTEM ================= */

function tickTurn(entity){

  tickCooldowns(entity);

function tickCooldowns(entity){
  if(!entity.abilities) return;

  entity.abilities.forEach(a=>{
    if(a.cooldown > 0){
      a.cooldown--;
    }
  });
}
 

}

const statusEffects = {

poison:{
  name:"Poison",
  tick(target){
    target.hp = Math.max(0, target.hp - Math.max(2, Math.floor(target.maxHp * 0.03)));
  }
},

burn:{
  name:"Burn",
  tick(target){
    target.hp = Math.max(0, target.hp - Math.max(2, Math.floor(target.maxHp * 0.04)));
  }
},

regen:{
  name:"Regen",

  tick(target){

    let before = target.hp;
    let healAmount = 5;

    target.hp = Math.min(target.maxHp, target.hp + healAmount);

    let healed = target.hp - before;

    if(healed > 0 && Array.isArray(target._regenCasters)){

      // split XP among all regen sources
      let xp = Math.floor((healed * 1.5) / target._regenCasters.length);

      target._regenCasters.forEach(caster=>{
        gainHealingXP(caster, xp);
      });
    }
  }
}
};

function renderHotbar(){
  let bar = el("combatHotbar");
  if(!bar) return;

  if(!isMobile()){
    bar.innerHTML = "";
    return;
  }

  let hero = heroes[currentHeroIndex];

  if(!hero || hero.hp <= 0 || hero.dead || !hero.abilities){
    bar.innerHTML = "";
    return;
  }

  bar.innerHTML = "";

  let sortedHotbarAbilities = hero.abilities
  .map((ability, ai) => ({ability, ai}))
  .sort((x, y) => {
    const order = { physical: 1, magic: 2, support: 3 };
    return (order[x.ability.type] || 99) - (order[y.ability.type] || 99);
  });

sortedHotbarAbilities.forEach(({ability, ai}) => {

    let btn = document.createElement("button");

let locked = ability.cooldown > 0;

    let shouldFlashTutorial =
  wave <= 2 &&
  hero._class === "Knight" &&
  !knightTutorialSkillsUsed[ability.name];

let typeClass = "";

if(ability.type === "physical"){
  typeClass = "skillAttack";
}

if(ability.type === "magic"){
  typeClass = "skillMagic";
}

if(ability.type === "support"){
  typeClass = "skillSupport";
}

btn.className = `hotbarBtn ${typeClass} ${locked ? "locked" : ""} ${shouldFlashTutorial ? "tutorialFlash" : ""}`;

    btn.innerHTML = `
      ${ability.name}
        ${locked ? `<span class="cooldownOverlay">${ability.cooldown}</span>` : ""}
    `;

    let holdTimer = null;
    let didPreview = false;
    let touchUsed = false;

    btn.addEventListener("touchstart", () => {
    didPreview = false;
    touchUsed = true;

      holdTimer = setTimeout(() => {
        didPreview = true;
        showAbilityPreview(hero, ability);
      }, 450);
    }, {passive:true});

    btn.addEventListener("touchend", () => {
      clearTimeout(holdTimer);

      if(didPreview) return;

      if(locked){
        showAbilityPreview(hero, ability);
        return;
      }

      heroAction(currentHeroIndex, ai);
      setTimeout(resetStoryPanel, 100);
    });

    btn.addEventListener("click", () => {

if(touchUsed) return;

      if(locked){
        showAbilityPreview(hero, ability);
        return;
      }

      heroAction(currentHeroIndex, ai);
      setTimeout(resetStoryPanel, 100);

setTimeout(() => {
  touchUsed = false;
}, 350);

    });

    bar.appendChild(btn);
  });
}

function typeStory(html){

  storyTypeId++;
  let thisType = storyTypeId;

  storyTyping = true;
  displayedStoryText = "";

  let i = 0;

  function tick(){

    if(thisType !== storyTypeId) return;

    let box = el("storyTextBox");

    if(!box){
      setTimeout(tick, 16);
      return;
    }

    // HANDLE HTML TAGS INSTANTLY
    if(html[i] === "<"){

      let close = html.indexOf(">", i);

      if(close !== -1){
        displayedStoryText += html.slice(i, close + 1);
        i = close + 1;
      }

    } else {

      displayedStoryText += html[i];
      i++;
    }

    box.innerHTML = displayedStoryText;

    box.scrollTop = box.scrollHeight;

let desc = el("descPanel");
if(desc){
  desc.scrollTop = desc.scrollHeight;
}

    if(i < html.length){

      // slower pauses after punctuation
      let delay = 18;

      let last = html[i-1];

      if(last === "." || last === "!" || last === "?"){
        delay = 140;
      }

      if(last === ","){
        delay = 70;
      }

      if(last === "\n"){
        delay = 120;
      }

      setTimeout(tick, delay);

    } else {

      displayedStoryText = html;
      storyTyping = false;
      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;

let desc = el("descPanel");
if(desc){
  desc.scrollTop = desc.scrollHeight;
}
    }
  }

  tick();
}

function recruit(unit, side = "hero"){

  if(side === "enemy"){
    enemies.push(unit);
  } else {
    heroes.push(unit);
  }

  log(`🧑‍🤝‍🧑 ${unit.name} joins the party!`);
  render();
}

function triggerPassive(hero, trigger){

  if(!hero.passives) return;

  hero.passives.forEach(p => {

    if(p.trigger === trigger){
      p.effect(hero);
    }

  });
}

function replaceAbility(hero, oldName, newAbility){
  let index = hero.abilities.findIndex(a => a.name === oldName);

  if(index !== -1){
    hero.abilities[index] = newAbility;
  } else {
    hero.abilities.push(newAbility);
  }
}

function addAbility(hero, ability){
  if(!hero.abilities.some(a => a.name === ability.name)){
    hero.abilities.push(ability);
  }
}

function createEnemy(type, wave, isBoss=false){

let base = enemyTypes[type];

let earlyGame = wave <= 3 ? 0.7 : 1;

// Adjust Enemy Scale //
let scale = 1 + wave * 0.035;
scale = Math.min(scale, 2.8 + wave * 0.02);
if (wave <= 3) {
  scale *= 0.7;
}

return {
  name: base.name,
  bossId: base.bossId,
  level: wave,

  hp: Math.floor(base.hp * scale * earlyGame),
  maxHp: Math.floor(base.hp * scale * earlyGame),

  attack: Math.floor(base.atk * scale * 0.9 * earlyGame),
  def: Math.floor(base.def * scale * 0.9),
  resist: Math.floor(base.resist * scale * 0.9),

  critRate: base.critRate || 0.03,
  critMult: base.critMult || 1.5,

  speed: Math.floor(base.speed * scale),

  status: {},

abilities: JSON.parse(JSON.stringify(base.abilities)).map(a => ({
  cooldown:0,
  cooldownMax:0,
  ...a
}))
};
}

    for(let i=0;i<count;i++){
      list.push(createEnemy("assassin", w));
    }
  }

  if(w === 5){
    list.push(createEnemy("assassin_boss", w, true));
  }
}

/* ================= DUNGEON ESCAPE (6–10) ================= */
else if(w <= 10){

  if(w < 10){
    let count = 2 + Math.floor(w/2);

    for(let i=0;i<count;i++){
      list.push(createEnemy("guard", w));
    }
  }

  if(w === 10){
    list.push(createEnemy("guard", w));
    list.push(createEnemy("dungeon_warden", w, true));
  }
}

/* ================= GOBLIN CAVES (11–15) ================= */
else if(w <= 15){

  if(w < 15){
    let pool = ["goblin","hobgoblin","elite_goblin","orc"];
    let count = 3 + Math.floor((w-10)/2);

    for(let i=0;i<count;i++){
      list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
    }
  }

  if(w === 15){
    list.push(createEnemy("goblin_king", w, true));
  }
}

/* ================= CORRUPTED FOREST (16–20) ================= */
else if(w <= 20){

if(w < 20){

  let pool = ["forest_wolf","ent","spore_mage"];
  let count = 3 + Math.floor((w-15)/2);

  for(let i=0;i<count;i++){
    list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
  }

}

  if(w === 20){
    list.push(createEnemy("colossal_wolf", w, true));
    list.push(createEnemy("evil_mage", w, true));
  }
}

/* ================= MAGIC EMPIRE (21-25) ================= */
else if(w <= 25){

  let pool = ["wisp","mage_apprentice","arcane_guardian"];

  let count = 3 + Math.floor((w-20)/2);

  for(let i=0;i<count;i++){
    list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
  }
}

/* ================= ENDLESS MODE (26+) ================= */
else{
  let pool = [
    "goblin","orc",
    "forest_wolf","ent",
    "foot_knight","lancer",
    "wisp","arcane_guardian"
  ];

  let count = Math.min(2 + Math.floor(w * 0.4), 7);

  for(let i=0;i<count;i++){
    let type = pool[Math.floor(Math.random()*pool.length)];
    list.push(createEnemy(type, w));
  }

  if(w % 5 === 0){
    list.push(createEnemy("ancient_dragon", w, true));
  }
}

// separate boss enemies (anything marked as boss via hp threshold or flag)
let bosses = list.filter(e =>
  e.bossId || e.maxHp >= 300 || e.name.includes("King") || e.name.includes("Dragon")
);

list = list.filter(e => !bosses.includes(e));

// ================= GLOBAL ENEMY LIMIT SYSTEM =================

// base cap
let baseCap = 5;

// reduce enemies right after bosses
let postBossPenalty = 0;

// boss waves get smaller enemy counts after them
if (wave === 6 || wave === 11 || wave === 16 || wave === 21) {
  postBossPenalty = 2;
}

// final cap calculation
let maxNormals = bosses.length > 0 ? (baseCap - bosses.length) : baseCap;

// apply post-boss reduction
maxNormals = Math.max(2, maxNormals - postBossPenalty);

// enforce cap
list = list.slice(0, maxNormals);

list.push(...bosses);
return list;
}

const rarityChances = {
  common: 0.85,
  uncommon: 0.12,
  rare: 0.02,
  legendary: 0.01
};

const baseDropChance = 0.35;


function rollRarity(){

  let r = Math.random();

  if(r < rarityChances.legendary) return "legendary";

  if(r < rarityChances.legendary + rarityChances.rare){
    return "rare";
  }

  if(r < rarityChances.legendary + rarityChances.rare + rarityChances.uncommon){
    return "uncommon";
  }

  return "common";
}

function getLoot(){

  let slotTypes = ["weapon", "armor", "accessory"];
  let slot = slotTypes[Math.floor(Math.random() * slotTypes.length)];

  // ONLY items allowed for this wave //
  let pool = items.filter(i =>
    i.slot === slot &&
    (!i.waveMin || wave >= i.waveMin) &&
    (!i.waveMax || wave <= i.waveMax)
  );

  // fallback if nothing matches //
  if(pool.length === 0){
    pool = items.filter(i => i.slot === slot);
  }

let rarity = rollRarity();

let rarityPool = pool.filter(i => i.rarity === rarity);

if(rarityPool.length === 0){
  rarityPool = pool;
}

return rarityPool[Math.floor(Math.random() * rarityPool.length)];
}

function equipItem(hero, item){

let slot = item.slot;

// equip
hero.equipment[slot] = item;

applyEquipmentStats(hero);

}

function tryPartyEquipItem(item){

  let bestHero = null;
  let bestGain = 0;

alive(heroes).forEach(hero => {
  if(hero._class === "PalaceGuard") return;

  if(!hero.equipment){
    hero.equipment = {weapon:null, armor:null, accessory:null};
  }

    let currentItem = hero.equipment[item.slot];

    let oldScore = currentItem ? getItemScoreForHero(hero, currentItem) : 0;
    let newScore = getItemScoreForHero(hero, item);

    let gain = newScore - oldScore;

    if(!currentItem){
      gain += 2; // bonus for empty slot
    }

    if(gain > bestGain){
      bestGain = gain;
      bestHero = hero;
    }
  });

  if(bestHero && bestGain > 0){
    equipItem(bestHero, item);
    log(`⬆️ ${bestHero.name} equips ${item.name} (${item.slot})`);
    return true;
  }

if(item.rarity === "legendary"){
  backpack.push(item);
  log(`🎒 ${item.name} was stored in the Backpack.`);
  render();
  return false;
}

log(`❌ Nobody benefits from ${item.name}. It is discarded.`);
return false;
}

function getTargets(actor, ability){

if(ability.target === "enemy"){

  let validEnemies = alive(enemies);
  if(validEnemies.length === 0) return [];

  let target = null;

  if(
    selectedEnemy != null &&
    enemies[selectedEnemy] &&
    enemies[selectedEnemy].hp > 0
  ){
    target = enemies[selectedEnemy];
  } else {
    target = validEnemies[0];
  }

  return [target];
}

if(ability.target === "allAllies"){
  return alive(heroes);
}

  if(ability.target === "allEnemies"){
    return alive(enemies);
  }

if(ability.target === "ally"){

  let validAllies = alive(heroes);
  if(validAllies.length === 0) return [];

  let target = null;

  if(
    selectedAlly != null &&
    heroes[selectedAlly] &&
    heroes[selectedAlly].hp > 0
  ){
    target = heroes[selectedAlly];
  } else {
    target = validAllies[0];
  }

  return [target];
}

  // SELF
  if(ability.target === "self"){
    return [actor];
  }

  return [];
}

function heroAction(hi,ai){

let h=heroes[hi];

if(
  !activeTurn ||
  activeTurn.type !== "hero" ||
  activeTurn.entity !== h
){
  log("⏳ It is not this hero's turn.");
  return;
}


if(!h || h.hp <= 0 || h.dead){
  log(`💀 ${h?.name || "Hero"} cannot act.`);
  render();
  return;
}

let a=h.abilities[ai];

if(wave <= 2 && h._class === "Knight"){
  knightTutorialSkillsUsed[a.name] = true;
}

let knightAnim = null;
let knightAnimDuration = 450;

if(h._class === "Knight"){
  if(a.apply === "defend"){
    knightAnim = "knightShield";
  }
  else if(a.name === "Quick Slash"){
    knightAnim = "knightQuickAttack";
  }
  else if(a.name === "Shield Bash"){
    knightAnim = "knightShieldBash";
  }
  else{
    knightAnim = "knightAttack";
  }
}

if(a.name === "Defend"){
  applyStatus(h, "defend");

  // put Defend on cooldown
  setCooldown(h, a);

  log(`${h.name} raises defenses (50% damage reduction for 1 turn)`);

render();

if(knightAnim){
  setKnightAnimation(knightAnim, knightAnimDuration);
}

activeTurn = null;
waitForAnimationThenNextTurn();
return;
}

if(a.type === "support" && (a.apply === "defend" || a.apply === "counter")){

  let targets = getTargets(h, a);

  targets.forEach(t => {
    applyStatus(t, "defend");
  });

  setCooldown(h, a);

  log(`${h.name} uses ${a.name}!`);

  render();

  if(knightAnim){
    setKnightAnimation(knightAnim, knightAnimDuration);
  }

  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Guardian Aura"){

  alive(heroes).forEach(t=>{
    let heal = a.power + Math.floor(h.def * 0.5);
    t.hp = Math.min(t.maxHp, t.hp + heal);
    applyStatus(t, "regen");
  });

  setCooldown(h, a);
  log(`${h.name} shields the party with Guardian Aura!`);
render();

if(knightAnim){
  setKnightAnimation(knightAnim, knightAnimDuration);
}

activeTurn = null;
waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Vanish"){

  h.evade = 1;

  setCooldown(h, a);
  log(`${h.name} vanishes into the shadows!`);
  render();
  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Smoke Dodge"){

  applyStatus(h, "defend");

  setCooldown(h, a);

  log(`${h.name} disappears into smoke and prepares to dodge!`);

  render();

  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Sanctuary"){


  alive(heroes).forEach(t=>{
    let heal = a.power + Math.floor(h.magic * 0.5);
    t.hp = Math.min(t.maxHp, t.hp + heal);

    if(t.status){
      delete t.status.poison;
      delete t.status.burn;
      delete t.status.stun;
    }

    applyStatus(t, "regen");
  });

  setCooldown(h, a);
  log(`${h.name} casts Sanctuary! Poison, burn, and stun are cleansed.`);
  render();
  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Arcane Barrier"){


  h.arcaneBarrier = 45 + Math.floor(h.magic * 1.2);

  setCooldown(h, a);
  log(`${h.name} creates an Arcane Barrier absorbing ${h.arcaneBarrier} damage!`);
  render();
  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.cooldown>0) return;


let targets = getTargets(h, a);
if(!targets.length) return;

targets.forEach(t => {

if(a.apply === "regen" || a.name.toLowerCase().includes("heal") || a.name.toLowerCase().includes("resurrection")){

    let heal = a.power + Math.floor(h.magic * 0.6);
    let beforeHp = t.hp;

t.hp = Math.min(t.maxHp, t.hp + heal);

let actualHeal = t.hp - beforeHp;

    log(`${h.name} heals ${t.name} for ${heal}`);

/* HEALING XP */

if(actualHeal > 0){
  gainHealingXP(h, actualHeal);
}

  } else {

 let dmg = computeDamage(h, t, a);
 t.hp = Math.max(0, t.hp - dmg);

if(t.status?.defend?.counter && dmg > 0){

  let counterDmg = Math.max(
    1,
    Math.floor(getStats(t).def * 0.8)
  );

  h.hp = Math.max(0, h.hp - counterDmg);

if(t.hp <= 0){
  t.hp = 0;
  t.dead = true;
  selectedAlly = null;

turnQueue = turnQueue.filter(q => q.entity !== t);

  log(`💀 ${t.name} falls!`);

}

  log(`🛡️ ${t.name} counters ${h.name} for ${counterDmg}`);
}

if(t.hp <= 0){

  t.dead = true;

  let xpAmount = 8 + Math.floor(t.level * 2);
  grantPartyXP(h, xpAmount);

  render();

  }, 500);

  if(enemies.length === 0){
    activeTurn = null;
    waitForAnimationThenNextTurn();
    return;
  }
}

log(`${h.name} uses ${a.name} on ${t.name} for ${dmg}`);

    if(a.apply){

  applyStatus(t, a.apply);

if(a.apply === "regen"){

 if(!t._regenCasters){
   t._regenCasters = [];
}

if(!t._regenCasters.includes(h)){
  t._regenCasters.push(h);
}
}


}

  }

});

setCooldown(h, a);

render();

if(knightAnim){
  setKnightAnimation(knightAnim, knightAnimDuration);
}

activeTurn = null;
waitForAnimationThenNextTurn();
}

/* ================= ENEMY AI ================= */

function summonEnemy(type, w){
  if(enemies.length >= maxEnemiesThisWave) return false;

  let summoned = createEnemy(type, w);

  // Insert summoned enemies above the first boss card
  let bossIndex = enemies.findIndex(e => e && e.bossId);

  if(bossIndex !== -1){
    enemies.splice(bossIndex, 0, summoned);
  } else {
    enemies.push(summoned);
  }

  log(`🧟 ${summoned.name} joins the battle!`);

  let init = getInitiative(summoned, wave);

  let newTurn = {
    type:"enemy",
    i: enemies.indexOf(summoned),
    entity: summoned,
    init
  };

  let alreadyActed = turnQueue.slice(0, turnIndex);
  let upcoming = turnQueue.slice(turnIndex);

  upcoming.push(newTurn);
  upcoming.sort((a,b)=>b.init-a.init);

  turnQueue = alreadyActed.concat(upcoming);

  renderTurnBar();
  render();

  return true;
}

function enemyAI(i){

  let e = enemies[i];
  
if(!e || e.hp <= 0 || e.dead) return;

log(`👹 ${e.name}'s turn!`);

/* BOSS PHASES */

if(
  e.maxHp >= 300 &&

  !e.phase2
){

  e.phase2 = true;

  e.attack += 8;
  e.speed += 3;

  log(`🔥 ${e.name} enters Phase 2!`);

}

  let targets = alive(heroes);
  if(!targets.length) return;

  let usable = e.abilities.filter(a => a.cooldown <= 0);

  if(usable.length === 0){
    usable = [e.abilities[0]];
  }

  let skill = usable[Math.floor(Math.random()*usable.length)];

e.intent = skill.name;

  setCooldown(e, skill);

/* ================= BOSS SUMMON ABILITIES ================= */

if(e.bossId === "royal_assassin" && skill.name === "Call Reinforcements"){

  let summoned = 0;

  if(summonEnemy("assassin", wave)) summoned++;
  if(summonEnemy("assassin", wave)) summoned++;

  if(summoned > 0){
    log(`🗡️ ${e.name} calls assassins from the shadows!`);
  } else {
    log(`🗡️ ${e.name} tries to call reinforcements, but the battlefield is full!`);
  }

  render();
  return;
}

if(e.bossId === "dungeon_warden" && skill.name === "Dungeon Alarm"){

}

}

if(e.bossId === "goblin_king" && skill.name === "Royal Guard Call"){

    if(summonEnemy("goblin_king_guard", wave)){
      log(`⚔️ ${e.name}'s royal guard enters battle!`);
    } else {

    }

    render();
    return;
  }

  // If he is above 45% HP, do not waste the turn.
  skill = e.abilities[0];
  e.intent = skill.name;
}

  let weighted = [];

targets.forEach(hero => {

  let weight = hero.def > 12 ? 3 : 1;

  for(let i = 0; i < weight; i++){
    weighted.push(hero);
  }

});

let t = weighted[Math.floor(Math.random() * weighted.length)];

if(skill.target === "allEnemies"){

  alive(heroes).forEach(target=>{

if(target.evade && target.evade > 0){
  target.evade--;
  log(`${target.name} evades ${e.name}'s attack!`);
  return;
}

let dmg = computeDamage(e, target, skill);

if(target.arcaneBarrier && target.arcaneBarrier > 0){
  let absorb = Math.min(dmg, target.arcaneBarrier);
  dmg -= absorb;
  target.arcaneBarrier -= absorb;
  log(`${target.name}'s Arcane Barrier absorbs ${absorb} damage!`);
}

target.hp = Math.max(0, target.hp - dmg);

if(target.hp <= 0){
  target.hp = 0;
  target.dead = true;
  selectedAlly = null;
  log(`💀 ${target.name} falls!`);
  render();
}

if(target.status?.defend?.counter && dmg > 0){
  let counterDmg = Math.max(1, Math.floor(getStats(target).def * 0.8));
  e.hp = Math.max(0, e.hp - counterDmg);
  log(`🛡️ ${target.name} counters ${e.name} for ${counterDmg}`);
}

    log(`${e.name} uses ${skill.name} on ${target.name} for ${dmg}`);

    if(skill.apply){
      applyStatus(target, skill.apply);
    }
  });

} else {

if(t.evade && t.evade > 0){
  t.evade--;
  log(`${t.name} evades ${e.name}'s attack!`);
  render();
  return;
}

let dmg = computeDamage(e, t, skill);

if(t.arcaneBarrier && t.arcaneBarrier > 0){
  let absorb = Math.min(dmg, t.arcaneBarrier);
  dmg -= absorb;
  t.arcaneBarrier -= absorb;
  log(`${t.name}'s Arcane Barrier absorbs ${absorb} damage!`);
}

t.hp = Math.max(0, t.hp - dmg);

if(t.hp <= 0){
  t.hp = 0;
  t.dead = true;
  selectedAlly = null;
  log(`💀 ${t.name} falls!`);
  render();
}

if(t.status?.defend?.counter && dmg > 0){
  let counterDmg = Math.max(1, Math.floor(getStats(t).def * 0.8));
  e.hp = Math.max(0, e.hp - counterDmg);
  log(`🛡️ ${t.name} counters ${e.name} for ${counterDmg}`);

if(e.hp <= 0){
  e.hp = 0;
  e.dead = true;
  cleanupDeadEnemies();
  return;
}
}

  log(`${e.name} uses ${skill.name} on ${t.name} for ${dmg}`);

  if(skill.apply){
    applyStatus(t, skill.apply);
  }
}

  render();
}

/* ================= TURN BAR ================= */

function renderTurnBar(){

  let bar = el("turnBar");
  bar.innerHTML = "";

  let visibleQueue = [
    ...turnQueue.slice(Math.max(0, turnIndex - 1)),
    ...turnQueue.slice(0, Math.max(0, turnIndex - 1))
  ];

  visibleQueue.slice(0, 8).forEach((t, index)=>{

    let entity = t.entity;

    if(!entity || entity.hp <= 0 || entity.dead) return;

    let div = document.createElement("div");

    div.className =
    `turnIcon
    ${t.type === "hero" ? "turnHero" : "turnEnemy"}
    ${index === 0 ? "turnActive" : ""}`;

    div.innerHTML = `
      <b>${t.type === "hero" ? "🛡️" : "👹"} ${entity.name}</b><br>
      HP ${entity.hp}/${entity.maxHp}
    `;

    bar.appendChild(div);
  });
}

/* =========================================================

/* ---------- XP SETTINGS ---------- */

function xpToNext(level){

  return Math.floor(
    70 * Math.pow(1.27, level)
  );

}

function gainHealingXP(caster, amount){

  let xp = Math.floor(amount * 1.5);

  caster.xp = (caster.xp || 0) + xp;

  log(`✨ ${caster.name} gains ${xp} healing XP`);

  while(caster.xp >= xpToNext(caster.level)){
    caster.xp -= xpToNext(caster.level);
    levelUp(caster);
  }
}

function gainXP(hero, amount){

  hero.xp = (hero.xp || 0) + amount;

  while(hero.xp >= xpToNext(hero.level)){
    hero.xp -= xpToNext(hero.level);
    levelUp(hero);
  }
}

function grantPartyXP(killer, amount){

  heroes.forEach(h => {
    if(h.hp <= 0) return;

    if(h === killer){
      gainXP(h, amount);
    } else {
      gainXP(h, Math.floor(amount * 0.40));
    }
  });
}

/* ---------- LEVEL UP ---------- */
function levelUp(h){

  h.level++;

  // 🎯 CORE GROWTH (controlled scaling)
h.maxHp += 10 + Math.floor(h.level * 1.2);
h.attack += 2;
h.def += 2;
h.magic += 2;
h.resist += 2;

  // restore
  h.hp = h.maxHp;


h.attackBase = h.attack;
h.defBase = h.def;
h.magicBase = h.magic;
h.resistBase = h.resist;
h.speedBase = h.speed;
h.critRateBase = h.critRate;
h.critMultBase = h.critMult;
h.maxHpBase = h.maxHp;


  log(`⬆️ ${h.name} reached Level ${h.level}`);

  handleClassEvolution(h);
  render();
}

// ====== SOFT CAP ====== //
function softCap(x){
  return 100 * (1 - Math.exp(-x / 100));
}

function applyEquipmentStats(hero){

hero.attack = hero.attackBase || hero.attack;
hero.def = hero.defBase || hero.def;
hero.magic = hero.magicBase || hero.magic;
hero.resist = hero.resistBase || hero.resist;
hero.speed = hero.speedBase || hero.speed;
hero.critRate = hero.critRateBase || hero.critRate;
hero.critMult = hero.critMultBase || hero.critMult;

hero.maxHp = hero.maxHpBase || hero.maxHp;

let bonus = {
  attack:0,
  def:0,
  magic:0,
  resist:0,
  hp:0,
  speed:0,
  critRate:0,
  critMult:0
};

let eq = hero.equipment || {};

for(let slot in eq){
  let item = eq[slot];
  if(!item || !item.stats) continue;

  for(let stat in item.stats){

    let value = Math.floor(item.stats[stat] * 0.85);

    if(bonus[stat] != null){
      bonus[stat] += value;
    }
  }
}

// apply bonuses
hero.attack += bonus.attack;
hero.def += bonus.def;
hero.magic += bonus.magic;
hero.resist += bonus.resist;

hero.maxHp += bonus.hp;
hero.maxMp += bonus.mp;
hero.maxStamina += bonus.stamina;
hero.speed += bonus.speed;
hero.critRate += bonus.critRate;
hero.critMult += bonus.critMult;

// clamp
hero.hp = Math.min(hero.hp, hero.maxHp);
}

/* ---------- XP HOOK ---------- */

function onKill(killer, enemy){

  triggerPassive(killer, "kill");

  // 🎯 DROP CHANCE (35% default)
let drop = null;

if(enemy.bossId){
  let bossPool = items.filter(i => i.bossOnly === enemy.bossId);

  if(bossPool.length > 0){
    drop = bossPool[Math.floor(Math.random() * bossPool.length)];
  }
}

if(drop || Math.random() < 0.35){

if(enemy.bossId && items.some(i => i.bossOnly === enemy.bossId)){
let bossPool = items.filter(i => i.bossOnly === enemy.bossId);

if(bossPool.length > 0){
  drop = bossPool[Math.floor(Math.random() * bossPool.length)];
  }
 }

if(!drop){
  drop = getLoot();
}

    log(`
🎁 <b>${enemy.name}</b> dropped a <span style="color:${rarityColor(drop.rarity)}">
${drop.rarity.toUpperCase()}
</span> item: <b>${drop.name}</b>
`);

tryPartyEquipItem(drop);

  } else {
    log(`💨 ${enemy.name} dropped nothing`);
  }
}

(function(){

const baseHeroAction = heroAction;

heroAction = function(hi, ai) {

  let beforeEnemies = enemies.map(e => e.hp);

  baseHeroAction(hi, ai);

  let h = heroes[hi];

  enemies.forEach((e, idx) => {

    if (!e) return;

    if (beforeEnemies[idx] > 0 && e.hp <= 0) {

      onKill(h, e);

      if(!animationPlaying){
        render();
      }

    }

  });

};

})();
