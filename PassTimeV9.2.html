<body>

<div id="turnBar"></div>
<div class="screen">
<div class="side" id="party"></div>
<div class="side" id="enemies"></div>
</div>

<div class="menu">
<div class="menuRow">
<div class="panelHero" id="heroPanel"></div>
<div id="combatHotbar"></div>
<div class="panelAbilities" id="abilityPanel"></div>
<div class="panelDesc" id="descPanel"></div>
</div>

  <div style="
    color:#888;
    font-size:11px;
    text-align:center;
    padding-bottom:4px;
  ">
    Click for extended tutorial
  </div>
</div>

<div id="tooltip"></div>

<script>

/* ================= STATE ================= */

let DEV_START_WAVE = 1; // WAVE SET
let DEV_MODE = DEV_START_WAVE > 1;

let wave = DEV_START_WAVE;

let selectedEnemy = null;
let selectedAlly = null;

let backpack = [];

let currentHeroIndex = 0;

let storyEventsTriggered = {};

let waveHandled = false;

let animationPlaying = false;

let knightAnimTimer = null;

let royalGuardAnimTimers = {};

let maxEnemiesThisWave = 5;

let turnQueue = [];
let turnIndex = 0;

let activeTurn = null;

let knightTutorialSkillsUsed = {};

let unitAnimIdCounter = 1;

const unitPositions = {
  Knight:{
    x:20,
    y:85,
    uiX:55,
    uiY:70
  },

  RoyalGuard:{
    default:{ x:20, y:90, uiX:22, uiY:72 },

    1:{ x:-25, y:0, uiX:10, uiY:-25 },
    2:{ x:-25, y:-175, uiX:10, uiY:-200 },
    3:{ x:20, y:-225, uiX:55, uiY:-250 }
  }
};

function getUnitPosition(unit, partyIndex){
  return unitPositions[unit._class]?.[partyIndex]
    || unitPositions[unit._class]
    || unitPositions.RoyalGuard[partyIndex]
    || { x:0, y:0, uiX:22, uiY:72 };
}

function getUnitTransform(unit){
  let partyIndex = heroes.indexOf(unit);
  let pos = getUnitPosition(unit, partyIndex);
  return `translate(${pos.x}px, ${pos.y}px)`;
}

function getEnemyPosition(enemyIndex){

  // Base stagger pattern
  let pattern = [
    { x:-20, y:85,  uiX:-55, uiY:70 },
    { x:25,  y:0,   uiX:-10, uiY:-25 },
    { x:25,  y:-175,uiX:-10, uiY:-200 },
    { x:-20, y:-225,uiX:-55, uiY:-250 }
  ];

  // Which stagger slot
  let slot = pattern[enemyIndex % pattern.length];

  // Every full row shifts downward slightly
  let row = Math.floor(enemyIndex / pattern.length);

  return {
    x: slot.x + (row * 18),
    y: slot.y + (row * 110),

    uiX: slot.uiX + (row * 18),
    uiY: slot.uiY + (row * 110)
  };
}

function getDashTransform(fromEntity, toEntity, baseTransform, maxDash = 175){
  if(!fromEntity || !toEntity) return baseTransform;

  let fromCard = [...document.querySelectorAll(".card")]
    .find(c => c.dataset.animId === String(fromEntity.animId));

  let toCard = [...document.querySelectorAll(".card")]
    .find(c => c.dataset.animId === String(toEntity.animId));

  if(!fromCard || !toCard) return baseTransform;

  let fromRect = fromCard.getBoundingClientRect();
  let toRect = toCard.getBoundingClientRect();

  let dx = (toRect.left + toRect.width / 2) - (fromRect.left + fromRect.width / 2);
  let dy = (toRect.top + toRect.height / 2) - (fromRect.top + fromRect.height / 2);

  dx = Math.max(-maxDash, Math.min(maxDash, dx * 1.55));
  dy = Math.max(-35, Math.min(35, dy * 0.25));

  return `${baseTransform} translate(${dx}px, ${dy}px)`;
}

function getItemScoreForHero(hero, item){
  if(!item || !item.stats) return 0;

  let weights = {
    attack:1,
    def:1,
    magic:1,
    resist:1,
    hp:0.5,
    speed:0.8,
    critRate:12,
    critMult:8
  };

  if(hero._class === "Knight"){
    weights.attack = 1.3;
    weights.def = 1.4;
    weights.resist = 1.1;
    weights.hp = 0.8;
  }

  if(hero._class === "Rogue"){
    weights.attack = 1.4;
    weights.speed = 1.4;
    weights.critRate = 18;
    weights.critMult = 12;
  }

  if(hero._class === "Cleric"){
    weights.magic = 1.5;
    weights.resist = 1.3;
    weights.def = 1.1;
    weights.mp = 0.8;
  }

  if(hero._class === "Mage"){
    weights.magic = 1.8;
    weights.mp = 1;
    weights.resist = 1.1;
    weights.critRate = 14;
  }

  let score = 0;

  for(let stat in item.stats){
    score += item.stats[stat] * (weights[stat] || 0);
  }

  score += (rarityRank[item.rarity] || 1) * 0.25;

  return score;
}

// LOG SPEED //
let logQueue = [];
let typing = false;

let skipLogTyping = false;

let skipAllLogs = false;

function log(t, instant = true){
  if(instant){
    let box = el("log");
    let line = document.createElement("div");
    line.innerHTML = t;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;

    // prevent infinite log buildup
while(box.children.length > 80){
  if(box.firstChild?.dataset?.permanent){
    break;
  }
  box.removeChild(box.firstChild);
}

    return;
  }

  logQueue.push(t);
  if(!typing) typeNextLog();
}

function typeNextLog(){

  if(skipAllLogs){
    let box = el("log");

    while(logQueue.length > 0){
      let text = logQueue.shift();
      let line = document.createElement("div");
      line.innerHTML = text;
      box.appendChild(line);
    }

    box.scrollTop = box.scrollHeight;

    typing = false;
    skipLogTyping = false;
    skipAllLogs = false;

    return;
  }

  if(logQueue.length === 0){
    typing = false;
    return;
  }

  typing = true;

  let text = logQueue.shift();
  let box = el("log");

  let line = document.createElement("div");
  box.appendChild(line);

  let i = 0;
  let buffer = "";

  function typeCharInner(){

    if(skipLogTyping){
      line.innerHTML = text;
      skipLogTyping = false;
      box.scrollTop = box.scrollHeight;
      setTimeout(typeNextLog, 0);
      return;
    }

    if(i < text.length){

      if(text[i] === "<"){
        let close = text.indexOf(">", i);

        if(close !== -1){
          buffer += text.slice(i, close + 1);
          i = close + 1;
        } else {
          buffer += text[i];
          i++;
        }
      } else {
        buffer += text[i];
        i++;
      }

      line.innerHTML = buffer;
      box.scrollTop = box.scrollHeight;

      setTimeout(typeCharInner, 12);

    } else {
      line.innerHTML = text;
      box.scrollTop = box.scrollHeight;
      setTimeout(typeNextLog, 60);
    }
  }

  typeCharInner();
}

function getStats(entity){

let eq = entity.equipment || {};

let bonus = {
  attack:0,
  def:0,
  magic:0,
  resist:0,
  hp:0,
  speed:0,
  critRate:0,
  critMult:0
};

for(let k in eq){
  let item = eq[k];
  if(!item) continue;

  for(let stat in item.stats){
    if(bonus[stat] != null){
      bonus[stat] += item.stats[stat];
    }
  }
}

return {
  attack:(entity.attack||0)+bonus.attack,
  def:(entity.def||0)+bonus.def,
  magic:(entity.magic||0)+bonus.magic,
  resist:(entity.resist||0)+bonus.resist,
  hp:(entity.maxHp||0)+bonus.hp,
  speed:(entity.speed||0)+bonus.speed,
  critRate:(entity.critRate||0)+bonus.critRate,
  critMult:(entity.critMult||0)+bonus.critMult
};

}

/* ================= DAMAGE ================= */

function computeDamage(attacker, target, skill){

  let a = getStats(attacker);
  let t = getStats(target);

  let atk = skill.scale === "magic" ? a.magic : a.attack;
  let def = skill.scale === "magic" ? t.resist : t.def;

if(skill.defensePierce){
  def *= (1 - skill.defensePierce);
}

  // 1. BASE SKILL DAMAGE (main driver)
  let base = skill.power + atk * 0.7;

  // 2. LEVEL SCALING (soft, not exponential)
  let levelScale = 1 + Math.log2(attacker.level + 1) * 0.08;

  // 3. DEFENSE MITIGATION (percentage-based)
  let defenseFactor = 100 / (100 + def);

  // 4. RANDOMNESS (tight range)
  let variance = 0.9 + Math.random() * 0.2;

  let dmg = base * levelScale * defenseFactor * variance;

  // 5. CRIT (applied last)
if(Math.random() < a.critRate){
  dmg *= a.critMult;
    log("💥 CRIT!");
  }

if(target.status?.defend){
  dmg *= (1 - target.status.defend.reduction);
}

return Math.max(1, Math.floor(dmg));
}

const statusEffects = {

poison:{
  name:"Poison",
  tick(target){
    let stacks = target.status?.poison?.stacks || 1;
    let poisonDamage = Math.max(2, Math.floor(target.maxHp * 0.02 * stacks));

    target.hp = Math.max(0, target.hp - poisonDamage);

},

burn:{

  tick(target){
    target.hp = Math.max(0, target.hp - Math.max(2, Math.floor(target.maxHp * 0.035)));
  }
},

regen:{
  name:"Regen",

  tick(target){

    let before = target.hp;

    let healAmount = Math.max(1, Math.floor(target.maxHp * 0.07));

    target.hp = Math.min(target.maxHp, target.hp + healAmount);

    let healed = target.hp - before;

    if(healed > 0 && Array.isArray(target._regenCasters)){

      // split XP among all regen sources
      let xp = Math.floor((healed * 1.2) / target._regenCasters.length);

      target._regenCasters.forEach(caster=>{
        gainHealingXP(caster, xp);
      });
    }
  }
}
};

function enemyIntentClass(intent){
  if(!intent) return "intentAttack";

  let t = intent.toLowerCase();

  if(t.includes("poison") || t.includes("burn") || t.includes("stun")){
    return "intentDebuff";
  }

  if(t.includes("guard") || t.includes("defend")){
    return "intentDefend";
  }

  if(t.includes("heal")){
    return "intentHeal";
  }

  return "intentAttack";
}

function applyStatus(t, type){
  if(!t.status) t.status = {};

  // DEFEND //
if(type === "defend"){
  t.status.defend = {
    duration: 1,
    reduction: 0.65,
    counter: false
  };
  return;
}

if(type === "counter"){
  t.status.defend = {
    duration: 999,
    reduction: 0.50,
    counter: true,
    expiresOnNextTurn: true
  };
  return;
}

if(type === "stun" && t.bossId && Math.random() < 0.70){
  log(`👑 ${t.name} resists the stun!`);
  return;
}

if(type === "poison" && t.bossId && Math.random() < 0.35){
  log(`👑 ${t.name} resists the poison!`);
  return;
}

if(type === "poison"){
  if(!t.status.poison){
    t.status.poison = {
      duration: 3,
      stacks: 1
    };
  } else {
    t.status.poison.stacks = Math.min(5, t.status.poison.stacks + 1);
    t.status.poison.duration = 3;
  }

  log(`☠️ ${t.name} poison stacks increased to ${t.status.poison.stacks}!`);
  return;
}

if(type === "burn" && t.bossId && Math.random() < 0.25){
  log(`👑 ${t.name} resists the burn!`);
  return;
}

  // normal statuses
  t.status[type] = 3;
}

function handleStatusDeath(t){
  if(!t || t.hp > 0) return false;

  t.hp = 0;
  t.dead = true;

  if(heroes.includes(t)){
    selectedAlly = null;

    if(activeTurn?.entity === t){
      activeTurn = null;

pruneTurnQueue();

if(turnIndex >= turnQueue.length){
  turnIndex = 0;
}

render();
renderTurnBar();
renderHotbar();
return true;
  }

  if(enemies.includes(t)){
    cleanupDeadEnemies();
    return true;
  }

  return false;
}

function tickStatus(t){

  if(!t || !t.status) return;

  for(let k in t.status){

    let s = t.status[k];

// HANDLE OBJECT STATUSES
if(typeof s === "object"){

  // Counter should last through ALL enemy attacks,
  // then expire only when this hero's next turn begins.
  if(s.expiresOnNextTurn){
    delete t.status[k];
    continue;
  }

  if(statusEffects[k]){
    let beforeHp = t.hp;

    statusEffects[k].tick(t);

    let diff = t.hp - beforeHp;

    if(diff > 0){
      showFloatText(t, `+${diff}`, "heal");
    }
    else if(diff < 0){
      showFloatText(t, `${diff}`, "damage");
    }
  }

  s.duration--;

  if(k === "poison"){
    log(`☠️ ${t.name} suffers poison x${s.stacks}`);
  }

if(handleStatusDeath(t)){
  return;
}

  if(s.duration <= 0){
    delete t.status[k];
  }

  continue;
}

    // HANDLE NORMAL STATUSES
    if(s > 0){
      t.status[k]--;
if (t.hp <= 0) continue;

if(statusEffects[k]){
  let beforeHp = t.hp;

statusEffects[k].tick(t);

let diff = t.hp - beforeHp;

if(diff > 0){
  showFloatText(t, `+${diff}`, "heal");
}
else if(diff < 0){
  showFloatText(t, `${diff}`, "damage");
}
}

if(handleStatusDeath(t)){
  return;
}
	
     if(k !== "defend"){
        if(k === "poison"){
  log(`☠️ ${t.name} is poisoned`);
}
else if(k === "burn"){
  log(`🔥 ${t.name} is burning`);
}
else if(k === "regen"){
  log(`✨ ${t.name} regenerates`);
}
else if(k === "defend"){
  log(`🛡️ ${t.name} braces for impact`);
}
else if(k === "counter"){
  log(`↩️ ${t.name} prepares to counterattack`);
}
else if(k !== "StartingShield"){
  log(`${t.name} is affected by ${k}`);
}
      }

      if(t.status[k] === 0){
        delete t.status[k];
      }
    }
  }
  /* stun handling */
  if(t.status.stun){
    t._stunned = true;
    delete t.status.stun;
    log(`${t.name} is stunned!`);
  }
}

function renderHotbar(){
  let bar = el("combatHotbar");
  if(!bar) return;

  if(!isMobile()){
    bar.innerHTML = "";
    return;
  }

  let hero = heroes[currentHeroIndex];

  if(!hero || hero.hp <= 0 || hero.dead || !hero.abilities){
    bar.innerHTML = "";
    return;
  }

bar.innerHTML = "";

let currentTurnEntity =
  activeTurn?.entity;

let playerTurn =
  currentTurnEntity &&
  heroes.includes(currentTurnEntity);

if(playerTurn){
  bar.classList.remove("inactive");
} else {
  bar.classList.add("inactive");
}


let sortedHotbarAbilities = hero.abilities
  .map((ability, ai) => ({ability, ai}))
  .sort((x, y) => {

    function getTypeOrder(a){

      // Physical attacks first
      if(a.type === "physical"){
        return 1;
      }

      // Magic + healing second
      if(
        a.type === "magic" ||
        a.target === "ally" ||
        a.target === "allAllies"
      ){
        return 2;
      }

      // Support / defense last
      return 3;
    }

    let typeDiff =
      getTypeOrder(x.ability) -
      getTypeOrder(y.ability);

    // Keep groups separated
    if(typeDiff !== 0){
      return typeDiff;
    }

    // Inside each group:
    // lower cooldown first
    let xCooldown = x.ability.cooldownMax ?? 0;
    let yCooldown = y.ability.cooldownMax ?? 0;

    if(xCooldown !== yCooldown){
      return xCooldown - yCooldown;
    }

    // Tie-breaker:
    // stronger skills first
    return (y.ability.power || 0) - (x.ability.power || 0);
  });

sortedHotbarAbilities.forEach(({ability, ai}) => {

    let btn = document.createElement("button");

let locked = ability.cooldown > 0;

    let shouldFlashTutorial =
  wave <= 2 &&
  hero._class === "Knight" &&
  !knightTutorialSkillsUsed[ability.name];

let typeClass = "";

if(ability.type === "physical"){
  typeClass = "skillAttack";
}

if(ability.type === "magic"){
  typeClass = "skillMagic";
}

if(ability.type === "support"){
  typeClass = "skillSupport";
}

btn.className = `hotbarBtn ${typeClass} ${locked ? "locked" : ""} ${shouldFlashTutorial ? "tutorialFlash" : ""}`;

    btn.innerHTML = `
      ${ability.name}
        ${locked ? `<span class="cooldownOverlay">${ability.cooldown}</span>` : ""}
    `;

    let holdTimer = null;
    let didPreview = false;
    let touchUsed = false;

    btn.addEventListener("touchstart", () => {
    didPreview = false;
    touchUsed = true;

      holdTimer = setTimeout(() => {
        didPreview = true;
        showAbilityPreview(hero, ability);
      }, 450);
    }, {passive:true});

    btn.addEventListener("touchend", () => {
      clearTimeout(holdTimer);

      if(didPreview) return;

      if(locked){
        showAbilityPreview(hero, ability);
        return;
      }

      heroAction(currentHeroIndex, ai);
      setTimeout(resetStoryPanel, 100);
    });

    btn.addEventListener("click", () => {

if(touchUsed) return;

      if(locked){
        showAbilityPreview(hero, ability);
        return;
      }

      heroAction(currentHeroIndex, ai);
      setTimeout(resetStoryPanel, 100);

setTimeout(() => {
  touchUsed = false;
}, 350);

    });

    bar.appendChild(btn);
  });
}

function typeStory(html){

  storyTypeId++;
  let thisType = storyTypeId;

  storyTyping = true;
  displayedStoryText = "";

  let i = 0;

  function tick(){

    if(thisType !== storyTypeId) return;

    let box = el("storyTextBox");

    if(!box){
      setTimeout(tick, 16);
      return;
    }

    // HANDLE HTML TAGS INSTANTLY
    if(html[i] === "<"){

      let close = html.indexOf(">", i);

      if(close !== -1){
        displayedStoryText += html.slice(i, close + 1);
        i = close + 1;
      }

    } else {

      displayedStoryText += html[i];
      i++;
    }

    box.innerHTML = displayedStoryText;

    box.scrollTop = box.scrollHeight;

let desc = el("descPanel");
if(desc){
  desc.scrollTop = desc.scrollHeight;
}

    if(i < html.length){

      // slower pauses after punctuation
      let delay = 18;

      let last = html[i-1];

      if(last === "." || last === "!" || last === "?"){
        delay = 140;
      }

      if(last === ","){
        delay = 70;
      }

      if(last === "\n"){
        delay = 120;
      }

      setTimeout(tick, delay);

    } else {

      displayedStoryText = html;
      storyTyping = false;
      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;

let desc = el("descPanel");
if(desc){
  desc.scrollTop = desc.scrollHeight;
}
    }
  }

  tick();
}

function triggerPassive(hero, trigger){

  if(!hero.passives) return;

  hero.passives.forEach(p => {

    if(p.trigger === trigger){
      p.effect(hero);
    }

  });
}

function replaceAbility(hero, oldName, newAbility){
  let index = hero.abilities.findIndex(a => a.name === oldName);

  if(index !== -1){
    hero.abilities[index] = newAbility;
  } else {
    hero.abilities.push(newAbility);
  }
}

function addAbility(hero, ability){
  if(!hero.abilities.some(a => a.name === ability.name)){
    hero.abilities.push(ability);
  }
}

function createEnemy(type, wave, isBoss=false){

let base = enemyTypes[type];

let earlyGame = wave <= 3 ? 0.8 : 1;

// Adjust Enemy Scale //
let scale = 1 + wave * 0.035;
scale = Math.min(scale, 2.8 + wave * 0.02);
if (wave <= 3) {
  scale *= 0.7;
}

return {
  animId: unitAnimIdCounter++,
  name: base.name,
  type:type,
  icon:getEnemyIcon(type),
  bossId: base.bossId,
  isBoss: !!base.bossId,
  level: wave,

  hp: Math.floor(base.hp * scale * earlyGame),
  maxHp: Math.floor(base.hp * scale * earlyGame),

  attack: Math.floor(base.atk * scale * 0.9 * earlyGame),
  def: Math.floor(base.def * scale * 0.9),
  resist: Math.floor(base.resist * scale * 0.9),

  critRate: base.critRate || 0.03,
  critMult: base.critMult || 1.5,

  speed: Math.floor(base.speed * scale),

  status: {},

abilities: JSON.parse(JSON.stringify(base.abilities)).map(a => ({
  cooldown:0,
  cooldownMax:0,
  ...a
}))
};
}

function createEnemies(w){

let list = [];

/* ================= KINGDOM ASSASSINS (1–5) ================= */
if(w <= 5){

  if(w < 5){
    let count = 2 + Math.floor(w/2);

    for(let i=0;i<count;i++){
      list.push(createEnemy("assassin", w));
    }
  }

  if(w === 5){
    list.push(createEnemy("assassin_boss", w, true));
  }
}

/* ================= DUNGEON ESCAPE (6–10) ================= */
else if(w <= 10){

  if(w < 10){
    let count = 2 + Math.floor(w/2);

    for(let i=0;i<count;i++){
      list.push(createEnemy("guard", w));
    }
  }

  if(w === 10){
    list.push(createEnemy("guard", w));
    list.push(createEnemy("dungeon_warden", w, true));
  }
}

/* ================= GOBLIN CAVES (11–15) ================= */
else if(w <= 15){

  if(w < 15){

    let pool;

    if(w <= 12){
      pool = ["goblin","hobgoblin"];
    } else {
      pool = ["goblin","hobgoblin","elite_goblin","orc"];
    }

    let count = 3 + Math.floor((w-10)/2);

    for(let i=0;i<count;i++){
      list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
    }
  }

  if(w === 15){
    list.push(createEnemy("goblin_king_guard", w));
    list.push(createEnemy("goblin_king", w, true));
  }
}

/* ================= CORRUPTED FOREST (16–20) ================= */
else if(w <= 20){

if(w < 20){

  let pool = ["forest_wolf","ent","spore_mage"];
  let count = 3 + Math.floor((w-15)/2);

  for(let i=0;i<count;i++){
    list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
  }

}

  if(w === 20){
    list.push(createEnemy("colossal_wolf", w, true));
    list.push(createEnemy("evil_mage", w, true));
  }
}

/* ================= MAGIC EMPIRE (21-25) ================= */
else if(w <= 25){

  let pool = ["wisp","mage_apprentice","arcane_guardian"];

  let count = 3 + Math.floor((w-20)/2);

  for(let i=0;i<count;i++){
    list.push(createEnemy(pool[Math.floor(Math.random()*pool.length)], w));
  }
}

/* ================= ENDLESS MODE (26+) ================= */
else{
  let pool = [
    "goblin","orc",
    "forest_wolf","ent",
    "foot_knight","lancer",
    "wisp","arcane_guardian"
  ];

  let count = Math.min(2 + Math.floor(w * 0.4), 7);

  for(let i=0;i<count;i++){
    let type = pool[Math.floor(Math.random()*pool.length)];
    list.push(createEnemy(type, w));
  }

  if(w % 5 === 0){
    list.push(createEnemy("ancient_dragon", w, true));
  }
}

// separate boss enemies (anything marked as boss via hp threshold or flag)
let bosses = list.filter(e =>
  e.bossId || e.maxHp >= 300 || e.name.includes("King") || e.name.includes("Dragon")
);

list = list.filter(e => !bosses.includes(e));

// ================= GLOBAL ENEMY LIMIT SYSTEM =================

// base cap
let baseCap = 5;

// reduce enemies right after bosses
let postBossPenalty = 0;

// boss waves get smaller enemy counts after them
if (wave === 6 || wave === 11 || wave === 16 || wave === 21) {
  postBossPenalty = 2;
}

// final cap calculation
let maxNormals = bosses.length > 0 ? (baseCap - bosses.length) : baseCap;

// apply post-boss reduction
maxNormals = Math.max(2, maxNormals - postBossPenalty);

// enforce cap
list = list.slice(0, maxNormals);

list.push(...bosses);
return list;
}

const rarityChances = {
  common: 0.85,
  uncommon: 0.12,
  rare: 0.02,
  legendary: 0.01
};

const baseDropChance = 0.35;


function rollRarity(){

  let r = Math.random();

  if(r < rarityChances.legendary) return "legendary";

  if(r < rarityChances.legendary + rarityChances.rare){
    return "rare";
  }

  if(r < rarityChances.legendary + rarityChances.rare + rarityChances.uncommon){
    return "uncommon";
  }

  return "common";
}

function getLoot(){

  let slotTypes = ["weapon", "armor", "accessory"];
  let slot = slotTypes[Math.floor(Math.random() * slotTypes.length)];

  // ONLY items allowed for this wave //
  let pool = items.filter(i =>
    i.slot === slot &&
    (!i.waveMin || wave >= i.waveMin) &&
    (!i.waveMax || wave <= i.waveMax)
  );

  // fallback if nothing matches //
  if(pool.length === 0){
    pool = items.filter(i => i.slot === slot);
  }

let rarity = rollRarity();

let rarityPool = pool.filter(i => i.rarity === rarity);

if(rarityPool.length === 0){
  rarityPool = pool;
}

return rarityPool[Math.floor(Math.random() * rarityPool.length)];
}

let slot = item.slot;

// equip
hero.equipment[slot] = item;

applyEquipmentStats(hero);

}

function tryPartyEquipItem(item){

  let bestHero = null;
  let bestGain = 0;

alive(heroes).forEach(hero => {
  if(hero._class === "RoyalGuard") return;

  if(!hero.equipment){
    hero.equipment = {weapon:null, armor:null, accessory:null};
  }

    let currentItem = hero.equipment[item.slot];

    let oldScore = currentItem ? getItemScoreForHero(hero, currentItem) : 0;
    let newScore = getItemScoreForHero(hero, item);

    let gain = newScore - oldScore;

    if(!currentItem){
      gain += 2; // bonus for empty slot
    }

    if(gain > bestGain){
      bestGain = gain;
      bestHero = hero;
    }
  });

  if(bestHero && bestGain > 0){
    equipItem(bestHero, item);
    log(`⬆️ ${bestHero.name} equips ${item.name} (${item.slot})`);
    return true;
  }

if(item.rarity === "legendary"){
  backpack.push(item);
  log(`🎒 ${item.name} was stored in the Backpack.`);
  render();
  return false;
}

log(`❌ Nobody benefits from ${item.name}. It is discarded.`);
return false;
}

/* ================= HERO ACTION ================= */

function getTargets(actor, ability){

if(ability.target === "enemy"){

  let validEnemies = alive(enemies);
  if(validEnemies.length === 0) return [];

  let target = null;

  if(
    selectedEnemy != null &&
    enemies[selectedEnemy] &&
    enemies[selectedEnemy].hp > 0
  ){
    target = enemies[selectedEnemy];
  } else {
    target = validEnemies[0];
  }

  return [target];
}

if(ability.target === "allAllies"){
  return alive(heroes);
}

  if(ability.target === "allEnemies"){
    return alive(enemies);
  }

if(ability.target === "ally"){

  let validAllies = alive(heroes);
  if(validAllies.length === 0) return [];

  let target = null;

  if(
    selectedAlly != null &&
    heroes[selectedAlly] &&
    heroes[selectedAlly].hp > 0
  ){
    target = heroes[selectedAlly];
  } else {
    target = validAllies
      .slice()
      .sort((a,b)=>(a.hp/a.maxHp) - (b.hp/b.maxHp))[0];
  }

  return [target];
}

  // SELF
  if(ability.target === "self"){
    return [actor];
  }

  return [];
}

function heroAction(hi,ai){

let h=heroes[hi];

if(
  !activeTurn ||
  activeTurn.type !== "hero" ||
  activeTurn.entity !== h
){
  log("⏳ It is not this hero's turn.");
  return;
}


if(!h || h.hp <= 0 || h.dead){
  log(`💀 ${h?.name || "Hero"} cannot act.`);
  render();
  return;
}

let a=h.abilities[ai];

if(wave <= 2 && h._class === "Knight"){
  knightTutorialSkillsUsed[a.name] = true;
}

let knightAnim = null;
let knightAnimDuration = 400;

let royalGuardAnim = false;
let royalGuardAnimDuration = 550;

if(h._class === "Knight"){
  if(a.apply === "defend"){
    knightAnim = "knightShield";
  }
else if(a.name === "Quick Slash"){
  knightAnim = "knightQuickAttack";
  knightAnimDuration = 350;
}
  else if(a.name === "Shield Bash"){
    knightAnim = "knightShieldBash";
  }
  else{
    knightAnim = "knightAttack";
  }
}

if(h._class === "RoyalGuard"){
  if(a.name === "Spear Strike" || a.name === "Shield Wall"){
    royalGuardAnim = true;
  }
}

if(a.name === "Defend"){
  applyStatus(h, "defend");

  // put Defend on cooldown
  setCooldown(h, a);

  log(`${h.name} raises defenses (50% damage reduction for 1 turn)`);

render();

if(knightAnim){

  // Only attack animations should dash toward a target
  let dashTarget =
    (a.target === "enemy" || a.target === "allEnemies")
      ? targets?.[0]
      : null;

  setKnightAnimation(
    knightAnim,
    knightAnimDuration,
    dashTarget
  );
}

if(royalGuardAnim){
  setRoyalGuardAnimation(h, a.name, knightAnimDuration, targets?.[0]);
}

endTurnAfterDelay(850);
return;
}

if(a.type === "support" && (a.apply === "defend" || a.apply === "counter")){

  let targets = getTargets(h, a);

  targets.forEach(t => {
    applyStatus(t, a.apply);

if(a.aggroTurns){
  t.aggro = a.aggroTurns;
}

  });

  setCooldown(h, a);

  log(`${h.name} uses ${a.name}!`);

  render();

if(knightAnim){
  setKnightAnimation(knightAnim, knightAnimDuration, targets[0]);
}

if(royalGuardAnim){
setRoyalGuardAnimation(h, a.name, knightAnimDuration, targets?.[0]);
}

endTurnAfterDelay(950);
return;
}

if(a.name === "Guardian Aura"){

alive(heroes).forEach(t=>{
  let heal = a.power + Math.floor(h.def * 0.5);
  let beforeHp = t.hp;
  t.hp = Math.min(t.maxHp, t.hp + heal);
  let actualHeal = t.hp - beforeHp;

  if(actualHeal > 0){
    showFloatText(t, `+${actualHeal}`, "heal");
  }

  applyStatus(t, "regen");
});

  setCooldown(h, a);
  log(`${h.name} surrounds the party with Guardian Aura!`);
render();

if(knightAnim){
  setKnightAnimation(knightAnim, knightAnimDuration);
}

if(royalGuardAnim){
 setRoyalGuardAnimation(h, a.name, knightAnimDuration, targets?.[0]);
}

endTurnAfterDelay(950);
return;
}

if(a.name === "Vanish"){

  h.evade = 1;

  setCooldown(h, a);
  log(`${h.name} vanishes into the shadows!`);
  render();
  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.name === "Smoke Dodge"){

  applyStatus(h, "defend");

  setCooldown(h, a);

  log(`${h.name} disappears into smoke and prepares to dodge!`);

  render();

if(h._class === "Rogue"){
  setRogueAnimation(
  h,
  a.name,
  500,
  targets?.[0]
);
}

endTurnAfterDelay(950);
return;
}

if(a.name === "Sanctuary"){


alive(heroes).forEach(t=>{
  let heal = a.power + Math.floor(h.magic * 0.5);
  let beforeHp = t.hp;
  t.hp = Math.min(t.maxHp, t.hp + heal);
  let actualHeal = t.hp - beforeHp;

  if(actualHeal > 0){
    showFloatText(t, `+${actualHeal}`, "heal");
  }

  if(t.status){
    delete t.status.poison;
    delete t.status.burn;
    delete t.status.stun;
  }

  applyStatus(t, "regen");
});

  setCooldown(h, a);
  log(`${h.name} casts Sanctuary! Poison, burn, and stun are cleansed.`);
  render();

endTurnAfterDelay(950);
return;
}

if(a.name === "Arcane Barrier"){


  h.arcaneBarrier = 45 + Math.floor(h.magic * 1.2);

  setCooldown(h, a);
  log(`${h.name} creates an Arcane Barrier absorbing ${h.arcaneBarrier} damage!`);
  render();
  activeTurn = null;
  waitForAnimationThenNextTurn();
  return;
}

if(a.cooldown>0) return;

if(a.name === "Chain Lightning"){

  let chainTargets = alive(enemies);
  if(!chainTargets.length) return;

  if(
    selectedEnemy != null &&
    enemies[selectedEnemy] &&
    enemies[selectedEnemy].hp > 0
  ){
    let first = enemies[selectedEnemy];
    chainTargets = [first, ...chainTargets.filter(e => e !== first)];
  }

  let multiplier = 1;

  chainTargets.forEach(t => {
    let chainSkill = {...a, power:Math.floor(a.power * multiplier)};
    let dmg = computeDamage(h, t, chainSkill);

playCardAnimation(h, "attackBump");
t.hp = Math.max(0, t.hp - dmg);
showFloatText(t, `-${dmg}`, "damage");
playCardAnimation(t, "damageShake");

    log(`${h.name}'s Chain Lightning hits ${t.name} for ${dmg}`);

    if(t.hp <= 0){
      t.hp = 0;
      t.dead = true;
      grantPartyXP(h, 8 + Math.floor(t.level * 2));
    }

    multiplier *= 0.72;

/* ================= ENEMY AI ================= */

function summonEnemy(type, w){
  if(enemies.length >= maxEnemiesThisWave) return false;

  let summoned = createEnemy(type, w);

summoned.justSummoned = true;

// Keep bosses at the top; add summoned enemies after existing enemies
enemies.push(summoned);


  let init = getInitiative(summoned, wave);

  let newTurn = {
    type:"enemy",
    i: enemies.indexOf(summoned),
    entity: summoned,
    init
  };

  let alreadyActed = turnQueue.slice(0, turnIndex);
  let upcoming = turnQueue.slice(turnIndex);

  upcoming.push(newTurn);
  upcoming.sort((a,b)=>b.init-a.init);

  turnQueue = alreadyActed.concat(upcoming);

renderTurnBar();

return summoned;
}

function setEnemyIntent(e){
  if(!e || !e.abilities) return;

  let usable = e.abilities.filter(a => a.cooldown <= 0);

  if(usable.length === 0){
    usable = [e.abilities[0]];
  }

  let skill = usable[Math.floor(Math.random() * usable.length)];

  e.intent = skill.name;
  e.intentSkillName = skill.name;
}

function enemyAI(i){

let e = enemies[i];
  
if(!e || e.hp <= 0 || e.dead) return;

log(`👹 ${e.name}'s turn!`);

if(

}

);

);

    skill = guardSkill;
  }
}

// Boss first turn: never summon
if(!skill && e.bossId && e.bossTurnCount === 1){
  skill = nonSummonSkills.length > 0
    ? nonSummonSkills[Math.floor(Math.random() * nonSummonSkills.length)]
    : usable[Math.floor(Math.random() * usable.length)];
}

// Boss second turn: 75% chance to summon if available
else if(!skill && e.bossId && e.bossTurnCount === 2){
  if(summonSkills.length > 0 && Math.random() < 0.75){
    skill = summonSkills[Math.floor(Math.random() * summonSkills.length)];
  } else if(!skill) {
    skill = nonSummonSkills.length > 0
      ? nonSummonSkills[Math.floor(Math.random() * nonSummonSkills.length)]
      : usable[Math.floor(Math.random() * usable.length)];
  }
}

// All other turns: normal random
else if(intentSkill){

}
else {

}

setCooldown(e, skill);

/* ================= BOSS SUMMON ABILITIES ================= */

let aggroTargets = targets.filter(hero => hero.aggro && hero.aggro > 0);

  bar.innerHTML = "";

  let visibleQueue = [
    ...turnQueue.slice(Math.max(0, turnIndex - 1)),
    ...turnQueue.slice(0, Math.max(0, turnIndex - 1))
  ];

  visibleQueue.slice(0, 8).forEach((t, index)=>{

    let entity = t.entity;

    if(!entity || entity.hp <= 0 || entity.dead) return;

    let div = document.createElement("div");

    div.className =
    `turnIcon
    ${t.type === "hero" ? "turnHero" : "turnEnemy"}
    ${index === 0 ? "turnActive" : ""}`;

div.innerHTML = `
  <b>${t.type === "hero" ? "🛡️" : "👹"} ${entity.name}</b>
`;

    bar.appendChild(div);
  });
}

/* =========================================================
   XP + LEVEL + CLASS EVOLUTION SYSTEM
   ========================================================= */

/* ---------- XP SETTINGS ---------- */

function xpToNext(level){

  return Math.floor(
    70 * Math.pow(1.27, level)
  );

}

function gainHealingXP(caster, amount){

  let xp = Math.floor(amount * 1.5);

  caster.xp = (caster.xp || 0) + xp;

  log(`✨ ${caster.name} gains ${xp} healing XP`);

  while(caster.xp >= xpToNext(caster.level)){
    caster.xp -= xpToNext(caster.level);
    levelUp(caster);
  }
}

function gainXP(hero, amount){

  hero.xp = (hero.xp || 0) + amount;

  while(hero.xp >= xpToNext(hero.level)){
    hero.xp -= xpToNext(hero.level);
    levelUp(hero);
  }
}

function grantPartyXP(killer, amount){

  heroes.forEach(h => {
    if(h.hp <= 0) return;

    if(h === killer){
      gainXP(h, amount);
    } else {
      gainXP(h, Math.floor(amount * 0.40));
    }
  });
}

/* ---------- LEVEL UP ---------- */
function levelUp(h){

  h.level++;

  // 🎯 CORE GROWTH (controlled scaling)
h.maxHp += 10 + Math.floor(h.level * 1.2);
h.attack += 2;
h.def += 2;
h.magic += 2;
h.resist += 2;

  // restore
  h.hp = h.maxHp;


h.attackBase = h.attack;
h.defBase = h.def;
h.magicBase = h.magic;
h.resistBase = h.resist;
h.speedBase = h.speed;
h.critRateBase = h.critRate;
h.critMultBase = h.critMult;
h.maxHpBase = h.maxHp;


  log(`⬆️ ${h.name} reached Level ${h.level}`);

  handleClassEvolution(h);
  render();
}

// ====== SOFT CAP ====== //
function softCap(x){
  return 100 * (1 - Math.exp(-x / 100));
}

function applyEquipmentStats(hero){

hero.attack = hero.attackBase || hero.attack;
hero.def = hero.defBase || hero.def;
hero.magic = hero.magicBase || hero.magic;
hero.resist = hero.resistBase || hero.resist;
hero.speed = hero.speedBase || hero.speed;
hero.critRate = hero.critRateBase || hero.critRate;
hero.critMult = hero.critMultBase || hero.critMult;

hero.maxHp = hero.maxHpBase || hero.maxHp;

let bonus = {
  attack:0,
  def:0,
  magic:0,
  resist:0,
  hp:0,
  speed:0,
  critRate:0,
  critMult:0
};

let eq = hero.equipment || {};

for(let slot in eq){
  let item = eq[slot];
  if(!item || !item.stats) continue;

  for(let stat in item.stats){

    let value = Math.floor(item.stats[stat] * 0.85);

    if(bonus[stat] != null){
      bonus[stat] += value;
    }
  }
}

// apply bonuses
hero.attack += bonus.attack;
hero.def += bonus.def;
hero.magic += bonus.magic;
hero.resist += bonus.resist;

hero.maxHp += bonus.hp;

if(hero.maxMp != null){
  hero.maxMp += bonus.mp || 0;
}

if(hero.maxStamina != null){
  hero.maxStamina += bonus.stamina || 0;
}

hero.speed += bonus.speed;
hero.critRate += bonus.critRate;
hero.critMult += bonus.critMult;

// clamp
hero.hp = Math.min(hero.hp, hero.maxHp);
}

/* ---------- XP HOOK ---------- */

function onKill(killer, enemy){

  triggerPassive(killer, "kill");

  // 🎯 DROP CHANCE (35% default)
let drop = null;

if(enemy.bossId){
  let bossPool = items.filter(i => i.bossOnly === enemy.bossId);

  if(bossPool.length > 0){
    drop = bossPool[Math.floor(Math.random() * bossPool.length)];
  }
}

if(drop || Math.random() < 0.35){

if(enemy.bossId && items.some(i => i.bossOnly === enemy.bossId)){
let bossPool = items.filter(i => i.bossOnly === enemy.bossId);

if(bossPool.length > 0){
  drop = bossPool[Math.floor(Math.random() * bossPool.length)];
  }
 }

if(!drop){
  drop = getLoot();
}

    log(`
🎁 <b>${enemy.name}</b> dropped a <span style="color:${rarityColor(drop.rarity)}">
${drop.rarity.toUpperCase()}
</span> item: <b>${drop.name}</b>
`);

tryPartyEquipItem(drop);

  } else {
    log(`💨 ${enemy.name} dropped nothing`);
  }
}

(function(){

const baseHeroAction = heroAction;

heroAction = function(hi, ai) {

  let beforeEnemies = enemies.map(e => e.hp);

  baseHeroAction(hi, ai);

  let h = heroes[hi];

  enemies.forEach((e, idx) => {

    if (!e) return;

    if (beforeEnemies[idx] > 0 && e.hp <= 0) {

      onKill(h, e);

      if(!animationPlaying){
        render();
      }

    }

  });

};

})();
